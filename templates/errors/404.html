{% extends 'base.html' %}
{% block title %}404 - Page Not Found | SMART REPAIR{% endblock %}
{% block content %}
<div style="min-height:90vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;">
<div>
    <div style="font-size:8rem;font-weight:700;font-family:Rajdhani;color:var(--primary);line-height:1;margin-bottom:1rem;text-shadow:0 0 80px rgba(230,57,70,0.3);">404</div>
    <div style="font-size:2rem;font-weight:700;margin-bottom:1rem;">Oops! Page Not Found</div>
    <p style="color:var(--text-muted);font-size:1.1rem;max-width:500px;margin:0 auto 2rem;">The page you're looking for doesn't exist or the details entered are incorrect. Please check and try again.</p>
    <div style="display:flex;gap:1rem;justify-content:center;">
        <a href="/" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Back to Home</a>
        <a href="/track-service/" class="btn btn-outline btn-lg"><i class="fas fa-search"></i> Track Service</a>
    </div>
    <div style="margin-top:3rem;display:flex;gap:3rem;justify-content:center;opacity:0.4;">
        <i class="fas fa-car" style="font-size:3rem;"></i>
        <i class="fas fa-motorcycle" style="font-size:3rem;"></i>
        <i class="fas fa-truck" style="font-size:3rem;"></i>
    </div>
</div>
</div>
{% endblock %}
