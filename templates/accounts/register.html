{% extends 'base.html' %}
{% block title %}Register - SMART REPAIR{% endblock %}
{% block extra_css %}
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;padding:5rem 0 2rem;}
.auth-container{max-width:560px;margin:0 auto;padding:0 1.5rem;width:100%;}
.auth-card{background:var(--card-bg);border:1px solid var(--border);border-radius:24px;padding:2.5rem;position:relative;overflow:hidden;}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent));}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align:center;margin-bottom:2rem;">
                <div style="width:72px;height:72px;background:rgba(230,57,70,0.1);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--primary);margin:0 auto 1rem;">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1 style="font-size:1.8rem;font-weight:700;">Create Account</h1>
                <p style="color:var(--text-muted);font-size:0.875rem;">Register as a SMART REPAIR customer</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">First Name *</label>
                        <input type="text" name="first_name" class="form-control" placeholder="First name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name *</label>
                        <input type="text" name="last_name" class="form-control" placeholder="Last name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Mobile Number * (OTP will be sent)</label>
                    <div style="position:relative;">
                        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);">+91</span>
                        <input type="tel" name="mobile_number" class="form-control" style="padding-left:45px;" placeholder="10-digit mobile number" maxlength="10" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email (Optional)</label>
                    <input type="email" name="email" class="form-control" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" rows="2" placeholder="Your full address"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">City</label>
                    <input type="text" name="city" class="form-control" placeholder="Your city">
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg" style="margin-top:0.5rem;">
                    <i class="fas fa-paper-plane"></i> Send OTP & Register
                </button>
            </form>

            <div style="text-align:center;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);">
                <p style="color:var(--text-muted);font-size:0.875rem;">Already have an account?
                    <a href="{% url 'customer_login' %}" style="color:var(--primary);font-weight:600;">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
