{% extends 'base.html' %}
{% block title %}Complete Profile | SMART REPAIR{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;padding:4rem 0;">
<div style="max-width:560px;margin:0 auto;padding:0 1.5rem;width:100%;">
<div class="card" style="position:relative;overflow:hidden;">
<div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent));"></div>
<div class="card-body">
<div style="text-align:center;margin-bottom:2rem;">
    <div style="width:72px;height:72px;background:rgba(230,57,70,0.1);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--primary);margin:0 auto 1rem;"><i class="fas fa-user-edit"></i></div>
    <h2 style="font-size:1.8rem;font-weight:700;">Complete Your Profile</h2>
    <p style="color:var(--text-muted);">Tell us a bit about yourself for a better experience</p>
</div>
<form method="post">
{% csrf_token %}
<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
    <div class="form-group"><label class="form-label">First Name *</label><input type="text" name="first_name" class="form-control" value="{{ user.first_name }}" required></div>
    <div class="form-group"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-control" value="{{ user.last_name }}"></div>
</div>
<div class="form-group"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ user.email }}"></div>
<div class="form-group"><label class="form-label">Address</label><textarea name="address" class="form-control" rows="2">{{ user.address }}</textarea></div>
<div class="form-group"><label class="form-label">City</label><input type="text" name="city" class="form-control" value="{{ user.city }}"></div>
<button type="submit" class="btn btn-primary w-100 btn-lg"><i class="fas fa-save"></i> Save Profile</button>
<a href="{% url 'home' %}" class="btn btn-outline w-100 mt-2">Skip for now</a>
</form>
</div>
</div>
</div>
</div>
{% endblock %}
